# corner settings
corner_num:
  x: '4mm'
  y: '4mm'
  font: 'Gentium Bold 28'
  width: '10mm'
corner_suit:
  x: '4mm'
  y: '10mm'
  font: 'Gentium 20'
  width: '10mm'

# PIP BASE: 62mm card. 12mm icon. 
# Center X = (62/2) - (12/2) = 25mm
pip_base:
  width: '12mm'
  height: '12mm'
  x: '25mm'

# 1, 2, 3
pip_1_A: {extends: pip_base, y: '38mm'}
pip_2_A: {extends: pip_base, y: '15mm'}
pip_2_B: {extends: pip_base, y: '61mm'}
pip_3_A: {extends: pip_base, y: '15mm'}
pip_3_B: {extends: pip_base, y: '38mm'}
pip_3_C: {extends: pip_base, y: '61mm'}

# Columns for 4, 5, 6, 7
# Left: 10mm. Right: 40mm.
pip_left:  {extends: pip_base, x: '10mm'}
pip_right: {extends: pip_base, x: '40mm'}

# 4
pip_4_A: {extends: pip_left,  y: '15mm'}
pip_4_B: {extends: pip_right, y: '15mm'}
pip_4_C: {extends: pip_left,  y: '61mm'}
pip_4_D: {extends: pip_right, y: '61mm'}

# 5
pip_5_A: {extends: pip_4_A}
pip_5_B: {extends: pip_4_B}
pip_5_C: {extends: pip_4_C}
pip_5_D: {extends: pip_4_D}
pip_5_E: {extends: pip_1_A}

# 6
pip_6_A: {extends: pip_left,  y: '15mm'}
pip_6_B: {extends: pip_left,  y: '38mm'}
pip_6_C: {extends: pip_left,  y: '61mm'}
pip_6_D: {extends: pip_right, y: '15mm'}
pip_6_E: {extends: pip_right, y: '38mm'}
pip_6_F: {extends: pip_right, y: '61mm'}

# 7
pip_7_A: {extends: pip_6_A}
pip_7_B: {extends: pip_6_B}
pip_7_C: {extends: pip_6_C}
pip_7_D: {extends: pip_6_D}
pip_7_E: {extends: pip_6_E}
pip_7_F: {extends: pip_6_F}
pip_7_G: {extends: pip_base, x: '25mm', y: '26mm'}

# Figures
figure_art_box:
  x: '7mm'
  y: '12mm'
  width: '48mm'
  height: '55mm'

figure_label: { x: '10mm', y: '70mm', width: '42mm', align: center } 
